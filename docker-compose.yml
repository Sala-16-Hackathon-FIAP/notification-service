services:
  postgres:
    image: postgres:16-alpine
    container_name: fiapx-notification-postgres
    environment:
      POSTGRES_DB: fiapx_notification
      POSTGRES_USER: fiapx
      POSTGRES_PASSWORD: fiapx123
    ports:
      - "5437:5432"
    volumes:
      - notification_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiapx -d fiapx_notification"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: fiapx-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: fiapx
      RABBITMQ_DEFAULT_PASS: fiapx123
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  notification_postgres_data:
